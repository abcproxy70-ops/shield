name: Update mobile-RU blocklist

# Запускается:
# - раз в неделю (понедельник 04:00 UTC)
# - вручную через Actions tab → "Run workflow"
on:
  schedule:
    - cron: '0 4 * * 1'   # каждый понедельник 04:00 UTC
  workflow_dispatch:        # ручной триггер

jobs:
  update-mobile-ru:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # нужно чтобы коммитить обновления

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate mobile-ru.txt
        run: |
          chmod +x .github/scripts/generate-mobile-ru.sh
          .github/scripts/generate-mobile-ru.sh > lists/mobile-ru.txt.new

      - name: Validate output
        run: |
          # Sanity check: должно быть >100 CIDR'ов, иначе RIPEstat вернул мусор
          LINES=$(grep -cE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$' lists/mobile-ru.txt.new || echo 0)
          echo "Generated $LINES CIDRs"
          if [ "$LINES" -lt 100 ]; then
            echo "::error::Only $LINES CIDRs generated (expected >100). Aborting."
            exit 1
          fi

      - name: Replace lists/mobile-ru.txt if changed
        run: |
          # Извлекаем только CIDR'ы (без header) для сравнения
          NEW_HASH=$(grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$' lists/mobile-ru.txt.new | sort -u | sha256sum | cut -d' ' -f1)
          OLD_HASH=$(grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$' lists/mobile-ru.txt 2>/dev/null | sort -u | sha256sum | cut -d' ' -f1)

          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "No changes, skipping commit"
            rm -f lists/mobile-ru.txt.new
            echo "CHANGED=false" >> $GITHUB_ENV
          else
            mv lists/mobile-ru.txt.new lists/mobile-ru.txt
            echo "Updated: $OLD_HASH → $NEW_HASH"
            echo "CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Commit and push
        if: env.CHANGED == 'true'
        run: |
          git config user.name  "shieldnode-bot"
          git config user.email "shieldnode-bot@users.noreply.github.com"
          git add lists/mobile-ru.txt

          # Считаем CIDR'ы для commit message
          COUNT=$(grep -cE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$' lists/mobile-ru.txt)
          git commit -m "auto: update mobile-ru.txt ($COUNT CIDRs from RIPEstat)"
          git push
